iterations:
  # update_provider mocks an upstream rollout partition emitting a
  # variable-length [num_updates, key_idx_0, reward_0, ...] batch. The
  # MaxPath value here = 4, so the slice is width 1 + 2*4 = 9. We pre-fill
  # 3 updates: key 1 +0.5, key 2 +1.0, key 1 +0.25. The trailing slot is
  # zero (an unused pair beyond num_updates=3).
  - name: update_provider
    params: {}
    init_state_values:
      [3,
       1, 0.5,
       2, 1.0,
       1, 0.25,
       0, 0]
    seed: 0
    state_width: 9
    state_history_depth: 1
  - name: agg
    params: {}
    params_from_upstream:
      mast_updates:
        upstream: 0
        indices: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    init_state_values:
      # MASTAggregationRowWidth(MaxKeys=4) = 8: [c0, s0, c1, s1, c2, s2, c3, s3]
      [0, 0, 0, 0, 0, 0, 0, 0]
    seed: 0
    state_width: 8
    state_history_depth: 1
init_time_value: 0.0
timesteps_history_depth: 1
