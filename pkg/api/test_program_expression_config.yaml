# A partition specified entirely as data: no `iteration` Go expression anywhere, so this
# config needs no code generation and no Go toolchain to run.
main:
  partitions:
  - name: walk
    params:
      drift: [0.5]
    init_state_values: [0.0]
    state_history_depth: 1
    seed: 3
  expressions:
  - partition: walk
    fields:
    - name: x
    outputs:
    - "x + drift * dt"
  # No simulation block: the test that loads this fixture supplies the
  # SimulationConfig programmatically after loading.
