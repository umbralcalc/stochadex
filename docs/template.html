      --bg-tertiary: #e8f0db;
      --border-color: #d6e3c5;

    /* Code blocks */
    pre {
      background-color: #1E1E1EB3;
      color: #f5f5f5;
      padding: 1.5rem;
      border-radius: var(--radius-md);
      overflow-x: auto;

      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;

    pre code {

      padding: 0;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
    }

    /* Mermaid diagrams: drop the code-block chrome so the diagram sits on the page
       with no background, border, or shadow (node fills come from mermaid's theme). */
    pre.mermaid {
      background-color: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      margin: 1.5rem 0;
      /* Side-scroll a diagram that is wider than the column instead of shrinking it. */
      overflow-x: auto;
      overflow-y: hidden;
      text-align: center;
    }
    /* Render every diagram at its natural size (mermaid runs with useMaxWidth:false):
       short diagrams are not upscaled, tall ones like trywizard are not squashed, and
       diagrams wider than the column overflow and scroll horizontally via the rule above. */
    pre.mermaid svg {
      width: auto !important;
      max-width: none !important;
      background-color: transparent;
      /* Centre when it fits the column; when wider, margins collapse and the
         parent scrolls horizontally. */
      display: block;
      margin: 0 auto;
    }
    /* Edge (link) labels: no background at all. edgeLabelBackground clears the
       .edgeLabel classes; .labelBkg is a separate div behind the label text that the
       theme fills semi-opaque grey, so clear it explicitly (mermaid sets it without
       !important, so this override wins regardless of its id-scoped selector). */
    pre.mermaid .labelBkg {
      background-color: transparent !important;
    }

    /* Go-specific syntax highlighting improvements */
    pre[class*="language-go"] {
      background-color: #1E1E1EB3;
    }

    /* Shell/Bash-specific syntax highlighting */
    pre[class*="language-bash"],

    pre[class*="language-shell-session"] {

    /* Lists */

    /* Tables. Wrapped at build time in <div class="table-scroll"> so a table wider
       than the column scrolls horizontally instead of squashing its columns. The
       table fills the column when it fits (min-width:100%) but grows to its content
       width when unbreakable content (e.g. long type names) needs more room. */
    .table-scroll {
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    table {
      width: auto;
      min-width: 100%;
      border-collapse: collapse;
      margin: 0;

      box-shadow: var(--shadow-sm);

    /* Responsive design */

  <script>
    // Mobile sidebar toggle
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
    }

    // Set active navigation item
    document.addEventListener('DOMContentLoaded', () => {
      const currentPath = window.location.pathname;
      const navLinks = document.querySelectorAll('.nav-links a');
      navLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.includes(href.replace('../', ''))) {
          link.classList.add('active');
          // Sections start collapsed; open the one holding the current page.
          const section = link.closest('details.nav-section');
          if (section) section.open = true;
        }
      });
    });
  </script>

  <!-- Mermaid: render ```mermaid fenced blocks (class="mermaid") into diagrams.
       Other code blocks use class="sourceCode …" and are left to Prism. -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      securityLevel: 'strict',
      theme: 'base',
      // Render at intrinsic size so wide diagrams are not shrunk to the column width;
      // the CSS above fixes the height and lets the container scroll horizontally.
      flowchart: { useMaxWidth: false },
      themeVariables: {
        // No diagram background.
        background: 'transparent',
        // Default (non-past-history) partition nodes. Past-copy and deadlock nodes
        // carry their own classDef fills in the generated source, so they override this.
        primaryColor: '#93C47D66',
        primaryBorderColor: '#5a8a3c',
        primaryTextColor: '#1a1a1a',
        lineColor: '#666',
        // No background behind edge (link) labels.
        edgeLabelBackground: 'transparent',
      },
    });
  </script>
