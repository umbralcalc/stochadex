name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency: # cancel superseded runs to save iteration time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        # These MUST match the credentials hardcoded in the integration test
        # (test/postgres_writing_and_querying_test.go); the analysis package
        # builds its connection string from user/password/dbname with no host,
        # so PGHOST/PGPORT below steer lib/pq to this container over TCP.
        env:
          POSTGRES_USER: stochadexuser
          POSTGRES_PASSWORD: stochadexpassword
          POSTGRES_DB: stochadexdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stochadexuser -d stochadexdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # lib/pq honours these when the connection string omits host/port
      # (pkg/analysis/postgres.go builds "user=… password=… dbname=… sslmode=disable").
      # 127.0.0.1 (not "localhost") forces IPv4 — the service container's port
      # mapping publishes on IPv4, and lib/pq otherwise resolves localhost to [::1].
      PGHOST: 127.0.0.1
      PGPORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      # -race keeps the goroutine-per-partition concurrency invariants honest;
      # -count=1 disables test caching so CI always re-runs the full suite.
      - run: go test ./... -race -count=1
      # Compute total statement coverage on merge only (keeps PR CI fast). Runs
      # here because this job has the Postgres service the integration test needs.
      # Non-blocking: a coverage hiccup must never fail a merge.
      - name: Coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          go test ./... -count=1 -coverprofile=cover.out -coverpkg=./...
          go tool cover -func=cover.out | tail -1 | grep -oE '[0-9]+\.[0-9]+' | head -1 > coverage.txt
          echo "coverage: $(cat coverage.txt)%"
      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  # Rebuild the docs site and (on merge to main only) publish it to the
  # stochadex.github.io repo. The whole job runs after the test job passes
  # (needs: [test]) so the site is never built from a commit whose tests failed;
  # the test job also guards that every model card's wiring diagram matches its
  # BuildStub (the cmd/model-graphs CI guard), so build.sh can trust the committed
  # cards are current.
  #
  # The BUILD runs on both PRs and merges — so pandoc/build breakage is caught on
  # the PR, not after merge. Only the final PUBLISH step is gated to push-to-main,
  # so PRs validate the build without touching the live site.
  site:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install gomarkdoc
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # Bring the coverage number (from the test job) to the repo root so build.sh's
      # badge generator finds it. Absent on PRs (coverage runs on merge only), in
      # which case the coverage badge renders "n/a" — fine, PRs don't publish.
      - name: Download coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
      - name: Build site
        run: bash build.sh
        working-directory: docs
      - name: Publish to stochadex.github.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          # Fine-grained PAT (or deploy key) with Contents:write on
          # stochadex/stochadex.github.io. Stored as a repo secret in
          # umbralcalc/stochadex — the built-in GITHUB_TOKEN cannot push cross-repo.
          DEPLOY_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          # Pages on stochadex.github.io serves the gh-pages branch at root. We
          # force-push a fresh single commit of the built site there, so the site
          # repo's main is NEVER touched and stays an exact mirror of upstream
          # (no confusing "N commits ahead"). Force-push keeps gh-pages a single
          # commit — no history buildup — the standard orphan-branch deploy pattern.
          pub="$(mktemp -d)"
          cp -R docs/. "$pub/"
          rm -rf "$pub/.temp" "$pub/.git"
          cd "$pub"
          git init -q -b gh-pages
          git config user.name "stochadex-ci"
          git config user.email "ci@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish docs site from umbralcalc/stochadex@${GITHUB_SHA}"
          git push -f \
            "https://x-access-token:${DEPLOY_TOKEN}@github.com/stochadex/stochadex.github.io.git" \
            gh-pages
