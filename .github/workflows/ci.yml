name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency: # cancel superseded runs to save iteration time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        # These MUST match the credentials hardcoded in the integration test
        # (test/postgres_writing_and_querying_test.go); the analysis package
        # builds its connection string from user/password/dbname with no host,
        # so PGHOST/PGPORT below steer lib/pq to this container over TCP.
        env:
          POSTGRES_USER: stochadexuser
          POSTGRES_PASSWORD: stochadexpassword
          POSTGRES_DB: stochadexdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stochadexuser -d stochadexdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # lib/pq honours these when the connection string omits host/port
      # (pkg/analysis/postgres.go builds "user=… password=… dbname=… sslmode=disable").
      # 127.0.0.1 (not "localhost") forces IPv4 — the service container's port
      # mapping publishes on IPv4, and lib/pq otherwise resolves localhost to [::1].
      PGHOST: 127.0.0.1
      PGPORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      # -race keeps the goroutine-per-partition concurrency invariants honest;
      # -count=1 disables test caching so CI always re-runs the full suite.
      # -coverprofile writes a merged coverage profile for the Codecov upload.
      - run: go test ./... -race -count=1 -coverprofile=cover.out
      # The opt-in pkg/arrowstore/ module (Apache Arrow egress) is a SEPARATE Go module, so the
      # root `./...` above excludes it — keeping Arrow (and its gonum v0.17 requirement) out of
      # the engine's go.mod. Build and test it explicitly against the local engine (its go.mod
      # uses replace => ../..) so PRs still catch breakage.
      - name: Build and test arrowstore module (opt-in Arrow egress)
        run: cd pkg/arrowstore && go build ./... && go test ./... -race -count=1
      # The opt-in pkg/s3store/ module (Amazon S3 / S3-compatible object storage) is a
      # SEPARATE module too, keeping the AWS SDK's dependency tree out of the engine's
      # go.mod. Pure Go, so it builds and tests like any other module.
      - name: Build and test s3store module (opt-in object-storage egress)
        run: cd pkg/s3store && go build ./... && go test ./... -race -count=1
      # The opt-in pkg/duckdbstore/ module (DuckDB analytical egress) is a SEPARATE Go module,
      # CGO and not WASM-compatible, so it stays out of the engine's and arrowstore's go.mod.
      # Its Arrow ingest lives behind the driver's `duckdb_arrow` tag. Build and test it
      # explicitly (CGO on) against the local sibling modules (replace => ../.. and ../arrowstore).
      - name: Build and test duckdbstore module (opt-in DuckDB egress)
        run: cd pkg/duckdbstore && CGO_ENABLED=1 go build -tags duckdb_arrow ./... && CGO_ENABLED=1 go test -tags duckdb_arrow ./... -count=1
      # The distributed CLI (cmd/stochadex-full) is a SEPARATE module bundling the opt-in
      # egress modules, so `./...` above excludes it. Build both flavours it ships so a
      # release cannot be the first time either is compiled: the portable one (pure Go,
      # what most users download) and the accelerated one (cgo + system BLAS + DuckDB).
      # Ubuntu runners have OpenBLAS available via apt for the cblas link.
      - name: Build the distributed CLI (portable, pure Go)
        run: cd cmd/stochadex-full && CGO_ENABLED=0 go build ./...
      - name: Build the distributed CLI (accelerated, cgo + BLAS + DuckDB)
        run: |
          sudo apt-get update && sudo apt-get install -y libopenblas-dev
          cd cmd/stochadex-full && CGO_ENABLED=1 CGO_LDFLAGS="-lopenblas" \
            go build -tags "cblas duckdb_arrow" ./...
      # Publish coverage to Codecov (external) for the coverage badge. Non-blocking:
      # a coverage-upload hiccup must never fail a merge. Needs the CODECOV_TOKEN
      # secret (from Codecov after enabling its app on the repo).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./cover.out
          token: ${{ secrets.CODECOV_TOKEN }}

  # Rebuild the docs site and (on merge to main only) publish it to the
  # stochadex.github.io repo. The whole job runs after the test job passes
  # (needs: [test]) so the site is never built from a commit whose tests failed;
  # the test job also guards that every model card's wiring diagram matches its
  # BuildStub (the cmd/model-graphs CI guard), so build.sh can trust the committed
  # cards are current.
  #
  # The BUILD runs on both PRs and merges — so pandoc/build breakage is caught on
  # the PR, not after merge. Only the final PUBLISH step is gated to push-to-main,
  # so PRs validate the build without touching the live site.
  site:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install gomarkdoc
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build site
        run: bash build.sh
        working-directory: docs
      - name: Publish to stochadex.github.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          # Fine-grained PAT (or deploy key) with Contents:write on
          # stochadex/stochadex.github.io. Stored as a repo secret in
          # umbralcalc/stochadex — the built-in GITHUB_TOKEN cannot push cross-repo.
          DEPLOY_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          # Pages on stochadex.github.io serves the gh-pages branch at root. We
          # force-push a fresh single commit of the built site there, so the site
          # repo's main is NEVER touched and stays an exact mirror of upstream
          # (no confusing "N commits ahead"). Force-push keeps gh-pages a single
          # commit — no history buildup — the standard orphan-branch deploy pattern.
          pub="$(mktemp -d)"
          cp -R docs/. "$pub/"
          rm -rf "$pub/.temp" "$pub/.git"
          cd "$pub"
          git init -q -b gh-pages
          git config user.name "stochadex-ci"
          git config user.email "ci@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish docs site from umbralcalc/stochadex@${GITHUB_SHA}"
          git push -f \
            "https://x-access-token:${DEPLOY_TOKEN}@github.com/stochadex/stochadex.github.io.git" \
            gh-pages
      # Force-pushing the gh-pages branch does not reliably trigger a GitHub Pages
      # rebuild (a push can be missed, and rapid successive publishes get throttled),
      # which leaves the live site stale even though gh-pages is current. Explicitly
      # request a Pages build so every publish deterministically redeploys. Needs the
      # token to also carry Pages:write on stochadex.github.io. Non-fatal on failure.
      - name: Trigger GitHub Pages deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          DEPLOY_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/stochadex/stochadex.github.io/pages/builds)
          echo "Pages build request HTTP $code"
          # 201 = build queued. 403/404 usually means the token lacks Pages:write.
          [ "$code" = "201" ] || echo "::warning::Pages build not queued (HTTP $code) — check SITE_DEPLOY_TOKEN has Pages:write"
