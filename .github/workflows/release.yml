name: Release binaries
# On every version tag, build the stochadex CLI and attach it to that tag's GitHub
# Release. This is what makes the "no Go toolchain" promise real: a user (or an agent
# installing the plugin) downloads a prebuilt binary instead of needing `go`.
#
# Two tiers, both from cmd/stochadex-full (one main package, two builds):
#
#   stochadex-<os>-<arch>        pure Go, CGO off, CROSS-compiled from one runner.
#                                Engine + Postgres + Arrow. Runs everywhere, no deps.
#                                This is the default download.
#
#   stochadex-accel-<os>-<arch>  cgo, -tags "cblas duckdb_arrow", built on NATIVE
#                                runners (cgo cannot cross-compile). Adds an optimised
#                                system BLAS and DuckDB output.
#
# Why native runners for the accel tier: cgo needs a target-native toolchain, and the
# DuckDB driver links a prebuilt static library per platform. macOS links Accelerate,
# which ships with the OS, so that binary has no runtime dependency at all. On Linux we
# try to link OpenBLAS *statically* for the same property, falling back to dynamic (and
# saying so in the release notes) if the static archive is unavailable.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create/upload to the tag's Release

jobs:
  # Tier 1 — the default asset. Pure Go, so one runner cross-compiles every platform.
  portable:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cross-compile the portable CLI
        working-directory: cmd/stochadex-full
        run: |
          set -euo pipefail
          mkdir -p dist
          for t in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            out="dist/stochadex-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${TAG}" -o "$out" .
          done
          ls -la dist
      - name: Attach to the Release
        working-directory: cmd/stochadex-full
        run: |
          set -euo pipefail
          # Create the Release from the tag annotation if it does not exist yet (a manual
          # `gh release create` with richer notes wins if it ran first); --clobber makes
          # re-runs idempotent.
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --notes-from-tag --verify-tag
          gh release upload "$TAG" dist/* --clobber

  # Tier 2 — the accelerated asset. cgo, so one native runner per target.
  accelerated:
    strategy:
      fail-fast: false # one platform failing to link must not withhold the others
      matrix:
        include:
          - runner: macos-14      # Apple silicon
            goos: darwin
            goarch: arm64
          # macos-15-intel, not macos-13: the macOS 13 image was deprecated in
          # September 2025 and fully retired that December. A retired label does not
          # fail the job — nothing ever claims it, so it sits queued until the 24h
          # limit cancels it, which is how v0.6.0 shipped without this asset.
          # x86_64 macOS goes away entirely when the macos-15 image retires in
          # autumn 2027; drop this leg then rather than hunting for another label.
          - runner: macos-15-intel # Intel
            goos: darwin
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install OpenBLAS (Linux only)
        if: matrix.goos == 'linux'
        # libopenblas-dev carries both the shared and the static (.a) archive; we prefer
        # the static one so the shipped binary has no runtime dependency.
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Build the accelerated CLI
        working-directory: cmd/stochadex-full
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/stochadex-accel-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # Accelerate is part of macOS — nothing to install, nothing to ship alongside.
            export CGO_LDFLAGS="-framework Accelerate"
          else
            # Prefer a statically linked OpenBLAS so the binary is self-contained. Fall
            # back to dynamic linking if the static archive is not where we expect.
            static_lib=$(find /usr/lib -name 'libopenblas*.a' 2>/dev/null | head -1 || true)
            if [ -n "$static_lib" ]; then
              echo "linking OpenBLAS statically from $static_lib"
              export CGO_LDFLAGS="$static_lib -lm -lpthread -lgfortran"
              echo "BLAS_LINKAGE=static" >> "$GITHUB_ENV"
            else
              echo "::warning::no static libopenblas found — linking dynamically; " \
                   "this binary will need libopenblas installed at runtime"
              export CGO_LDFLAGS="-lopenblas"
              echo "BLAS_LINKAGE=dynamic" >> "$GITHUB_ENV"
            fi
          fi

          CGO_ENABLED=1 go build -trimpath \
            -ldflags "-s -w -X main.version=${TAG}" \
            -tags "cblas duckdb_arrow" -o "$out" .
          ls -la dist

      # Prove the accelerated binary actually starts and runs a simulation on this
      # platform before publishing it. A binary that cannot resolve its BLAS at runtime
      # is worse than no accelerated binary at all, so a failure here must not upload.
      - name: Smoke-test the binary
        working-directory: cmd/stochadex-full
        run: |
          set -euo pipefail
          cat > /tmp/smoke.yaml <<'EOF'
          main:
            partitions:
            - name: walk
              iteration: {type: wiener_process}
              params: {variances: [1.0]}
              init_state_values: [0.0]
              state_history_depth: 1
              seed: 7
            simulation:
              output_condition: {type: every_step}
              output_function: {type: stdout}
              termination_condition: {type: number_of_steps, max_steps: 3}
              timestep_function: {type: constant, stepsize: 1.0}
              init_time_value: 0.0
          EOF
          ./dist/stochadex-accel-${{ matrix.goos }}-${{ matrix.goarch }} \
            --config /tmp/smoke.yaml | tee /tmp/out.txt
          grep -q "3 walk" /tmp/out.txt || {
            echo "accelerated binary did not produce the expected output"; exit 1; }

      - name: Report BLAS linkage (Linux)
        if: matrix.goos == 'linux'
        run: |
          echo "BLAS linkage: ${BLAS_LINKAGE:-unknown}"
          ldd "cmd/stochadex-full/dist/stochadex-accel-${{ matrix.goos }}-${{ matrix.goarch }}" \
            | grep -i openblas && echo "::warning::binary dynamically links OpenBLAS" || \
            echo "no dynamic OpenBLAS dependency — binary is self-contained"

      - name: Attach to the Release
        working-directory: cmd/stochadex-full
        run: |
          set -euo pipefail
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --notes-from-tag --verify-tag
          gh release upload "$TAG" dist/* --clobber

  # Tier 3 — the OCI image. This is the unit cloud-native pipelines compose: a
  # Kubernetes Job, Argo step or Cloud Run Job takes an image, not a binary, so
  # without this every downstream consumer has to build a wrapper image around a
  # released binary. GHCR needs no new secrets — GITHUB_TOKEN with packages: write.
  #
  # Built on NATIVE runners per architecture and merged into one manifest below,
  # for the same reason the accelerated binaries are: the image is the accelerated
  # CLI, cgo cannot cross-compile, and building arm64 under QEMU would emulate a
  # full DuckDB and OpenBLAS link for no benefit when an arm64 runner is available.
  image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            slug: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            slug: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive the version from the tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      # Push by digest only: neither per-arch build is a usable tag on its own, and
      # tagging them would briefly leave :latest pointing at a single architecture.
      # The manifest job below is what publishes the human-facing tags.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.slug }}
      - name: Export the digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-architecture images into one multi-arch manifest and publish
  # the tags users actually pull.
  image-manifest:
    needs: [image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Checked out for the cfg/ the smoke test runs, at exactly the tagged commit.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      # binfmt so the arm64 half of the manifest can actually be executed here for
      # the smoke test; the builds themselves were native.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive the version from the tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      # :latest only moves for a final release. A prerelease tag (v1.2.3-rc.1)
      # publishes its own tag but must not become what `docker pull stochadex`
      # resolves to.
      - name: Create the multi-arch manifest
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository }}"
          tags=(-t "${image}:${VERSION}")
          if [[ "$GITHUB_REF_NAME" != *-* ]]; then
            tags+=(-t "${image}:latest")
          else
            echo "prerelease tag — not moving :latest"
          fi
          cd /tmp/digests
          docker buildx imagetools create "${tags[@]}" \
            $(printf "${image}@sha256:%s " *)
          docker buildx imagetools inspect "${image}:${VERSION}"
      # A published image that cannot run a config is not a working release, and a
      # manifest that resolves on only one architecture is a broken manifest. Pull
      # each platform back and step a real config through it.
      - name: Smoke-test the published manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          # Both architectures must resolve and report the full feature set — a
          # manifest that only works on one arch is a broken manifest, and a build
          # that silently lost an integration is worse than one that failed.
          for platform in linux/amd64 linux/arm64; do
            echo "--- ${platform}"
            docker run --rm --platform "${platform}" "${IMAGE}:${VERSION}" --version
            for feature in arrow postgres s3 cblas duckdb; do
              docker run --rm --platform "${platform}" "${IMAGE}:${VERSION}" --version \
                | grep -q "$feature" \
                || { echo "${platform} image is missing the $feature integration"; exit 1; }
            done
          done
          # And it must actually step a config, not merely start.
          docker run --rm --platform linux/amd64 -v "$PWD:/work" "${IMAGE}:${VERSION}" \
            --config cfg/example_data_only_config.yaml | tail -5

          # Provenance binding: a run must stamp which build produced it, and echo the
          # image digest a deployer injects. Resolve this manifest's digest and prove
          # the run reports it — this is the containerised claim-to-test binding, so a
          # silent regression in it must fail the release, not surface later as an
          # unreproducible result.
          digest=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{.Manifest.Digest}}')
          echo "manifest digest: ${digest}"
          prov=$(docker run --rm --platform linux/amd64 \
            -e STOCHADEX_IMAGE_DIGEST="${digest}" -v "$PWD:/work" "${IMAGE}:${VERSION}" \
            --config cfg/example_data_only_config.yaml 2>&1 >/dev/null \
            | grep '^stochadex-run ')
          echo "provenance line: ${prov}"
          case "${prov}" in
            *"version=${VERSION}"*) ;;
            *) echo "provenance line missing the expected version"; exit 1 ;;
          esac
          case "${prov}" in
            *"image=${digest}"*) ;;
            *) echo "provenance line did not echo the injected image digest"; exit 1 ;;
          esac
          case "${prov}" in
            *"revision=${{ github.sha }}"*) ;;
            *) echo "provenance line missing the build revision"; exit 1 ;;
          esac
